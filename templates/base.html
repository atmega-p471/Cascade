{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Cascade{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body data-page="{% block page %}{% endblock %}">
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="logo" href="{% url 'dashboard' %}">
        <span class="logo__text">Cascade</span>
      </a>
      <nav class="site-nav" aria-label="Основное меню">
        <div id="nav-guest" class="nav-cluster nav-cluster--guest">
          <a class="nav-text" href="{% url 'login' %}">Вход</a>
          <a class="nav-cta" href="{% url 'register' %}">Регистрация</a>
        </div>
        <div id="nav-auth" class="nav-cluster nav-cluster--auth" hidden>
          <div class="nav-links" role="navigation" aria-label="Разделы приложения">
            <a class="nav-pill" href="{% url 'add_achievement' %}">Достижение</a>
            <a class="nav-pill nav-pill--accent" href="{% url 'calculate' %}">Баллы</a>
            <a class="nav-pill nav-pill--admin" id="nav-admin-link" href="{% url 'admin' %}" hidden>Админ</a>
          </div>
          <a class="nav-profile" href="{% url 'dashboard' %}" title="Личный кабинет" id="nav-profile-link">
            <span class="nav-profile__avatar" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <span id="nav-user-short" class="nav-user-short"></span>
          </a>
          <button type="button" class="nav-out" id="nav-logout" title="Выйти из аккаунта">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
            <span class="nav-out__label">Выход</span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Cascade — демо: данные в браузере (localStorage), без сервера.</p>
    </div>
  </footer>

  <script type="module" src="{% static 'js/main.js' %}"></script>
</body>
</html>
